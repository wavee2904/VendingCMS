services:
  redis:
    image: redis:7-alpine
    container_name: vendingad-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vendingad-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "VendingAd@12345"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vendingad-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "vendingad"
      RABBITMQ_DEFAULT_PASS: "vendingad@123"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  seq:
    image: datalust/seq:2024.3
    container_name: vendingad-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data

volumes:
  redis-data:
  sqlserver-data:
  rabbitmq-data:
  seq-data:
