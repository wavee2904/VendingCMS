name: Publish Artifact

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore VendingAdSolution/VendingAdSolution.sln

      - name: Publish
        run: dotnet publish VendingAdSolution/VendingAdSystem/VendingAdSystem.csproj --configuration Release --output ./publish --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vending-ad-publish
          path: ./publish
