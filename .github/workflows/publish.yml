name: Publish Artifact

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore VendingAdSolution/VendingAdSolution.sln

      - name: Build
        run: dotnet build VendingAdSolution/VendingAdSolution.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VendingAdSolution/VendingAdSolution.sln --configuration Release --no-build

      - name: Publish web
        run: dotnet publish VendingAdSolution/VendingAdSystem/VendingAdSystem.csproj --configuration Release --output ./publish-web --no-restore

      - name: Publish worker
        run: dotnet publish VendingAdSolution/VendingAdWorker/VendingAdWorker.csproj --configuration Release --output ./publish-worker --no-restore

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: vending-ad-web
          path: ./publish-web

      - name: Upload worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: vending-ad-worker
          path: ./publish-worker
