name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev
      - main

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore VendingAdSolution/VendingAdSolution.sln

      - name: Build
        run: dotnet build VendingAdSolution/VendingAdSolution.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VendingAdSolution/VendingAdSolution.sln --configuration Release --no-build
